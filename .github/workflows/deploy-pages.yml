name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-progress deploy at a time; don't cancel a running production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # GitHub Pages serves a project site at /<repo>/; Vite reads BASE for asset URLs.
      BASE: /${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Bonus: regenerate the component-tier living docs (jsdom, no browser) so the
      # story reports are browsable at /<repo>/docs/. Non-blocking — the demo app
      # still deploys if a story run hiccups. (e2e stories need a browser; skipped here.)
      - name: Generate component story docs
        continue-on-error: true
        run: pnpm test

      - name: Build demo app
        run: pnpm build

      - name: Bundle story docs into the site
        run: |
          mkdir -p dist/docs
          cp -R docs/. dist/docs/ 2>/dev/null || echo "no docs to copy"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
